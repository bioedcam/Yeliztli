name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python linter
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  # ── Cross-platform backend tests ────────────────────────
  test-backend:
    name: Backend Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS ARM64
          - os: macos-15-intel
            name: macOS x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/backend/ -v --tb=short -m "not slow"

      - name: Verify platform detection
        run: |
          python -c "
          import platform, sys
          print(f'OS: {platform.system()}')
          print(f'Machine: {platform.machine()}')
          print(f'Python: {sys.version}')
          from backend.installer import _detect_platform
          print(f'Detected platform: {_detect_platform()}')
          "

  # ── Frontend tests ──────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Vitest
        run: cd frontend && npm test

  # ── Cross-platform native install smoke test ────────────
  smoke-install:
    name: Install Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS ARM64
          - os: macos-15-intel
            name: macOS x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: Verify CLI entry point
        run: genomeinsight-setup --help

      - name: Verify data dir creation
        run: |
          python -c "
          from backend.installer import ensure_data_dir, DATA_DIR
          ensure_data_dir()
          assert DATA_DIR.is_dir()
          assert (DATA_DIR / 'samples').is_dir()
          assert (DATA_DIR / 'downloads').is_dir()
          assert (DATA_DIR / 'logs').is_dir()
          print('Data directory OK:', DATA_DIR)
          "

      - name: Verify platform detection
        run: |
          python -c "
          import platform
          from backend.installer import _detect_platform
          plat = _detect_platform()
          machine = platform.machine().lower()
          print(f'Platform: {plat}, Architecture: {machine}')
          assert plat in ('macos', 'linux', 'wsl2'), f'Unexpected platform: {plat}'
          "

      - name: Verify service templates exist
        run: |
          python -c "
          from pathlib import Path
          from backend.installer import _detect_platform, _repo_root
          plat = _detect_platform()
          root = _repo_root()
          if plat == 'macos':
              assert (root / 'launchd' / 'com.genomeinsight.api.plist').exists()
              assert (root / 'launchd' / 'com.genomeinsight.huey.plist').exists()
              print('macOS launchd templates: OK')
          else:
              assert (root / 'systemd' / 'genomeinsight-api.service').exists()
              assert (root / 'systemd' / 'genomeinsight-huey.service').exists()
              print('Linux/WSL2 systemd templates: OK')
          "

      - name: Verify health endpoint (quick start/stop)
        run: |
          # shellcheck disable=SC2329  # invoked indirectly via the EXIT trap
          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30 seconds"
          exit 1

  # ── Docker Compose build ────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Verify image exists
        run: docker images genomeinsight:latest --format "{{.Repository}}:{{.Tag}} {{.Size}}"

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 10

      - name: Health check
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health; then
              echo "Docker health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Docker health check failed"
          docker compose logs
          exit 1

      - name: Verify both services running
        run: |
          docker compose ps --format json | python3 -c "
          import json, sys
          services = [json.loads(line) for line in sys.stdin]
          names = [s.get('Service', s.get('Name', '')) for s in services]
          print(f'Running services: {names}')
          assert len(services) >= 2, f'Expected 2+ services, got {len(services)}'
          for s in services:
              state = s.get('State', s.get('Status', ''))
              assert 'running' in state.lower() or 'up' in state.lower(), \
                  f'Service {s.get(\"Service\", s.get(\"Name\"))} not running: {state}'
          print('All services running OK')
          "

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ── E2E Tests (cross-browser: Chrome, Firefox, Safari) ──
  test-e2e:
    name: E2E Tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install root E2E deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          GENOMEINSIGHT_HUEY_IMMEDIATE: "true"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Performance benchmarks ──────────────────────────────
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmarks
        run: python -m pytest tests/backend/test_benchmark.py -v --tb=short -m "slow or benchmark" || true
