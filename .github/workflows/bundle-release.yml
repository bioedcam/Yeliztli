name: Bundle Release (verify-and-publish)

# Manual-only workflow that verifies a drafted VEP bundle release matches the
# `bundles/manifest.json` entry before a maintainer publishes it.
#
# See docs/bundle-release-runbook.md for the end-to-end release sequence.
# This workflow runs step 6 of that runbook.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to verify (e.g., bundle-v2.0.0)"
        required: true
        type: string
      bundle_key:
        description: "Manifest key to verify against"
        required: true
        type: choice
        default: "vep_bundle"
        options:
          - vep_bundle
          - lai_bundle

concurrency:
  group: bundle-release-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify bundle asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve manifest entry
        id: manifest
        run: |
          python <<'PY'
          import json, os, pathlib, sys

          manifest_path = pathlib.Path("bundles/manifest.json")
          manifest = json.loads(manifest_path.read_text())

          key = "${{ inputs.bundle_key }}"
          entry = manifest.get("bundles", {}).get(key)
          if entry is None:
              print(f"::error::manifest has no entry for bundle key {key!r}")
              sys.exit(1)

          required = ("version", "url", "sha256", "size_bytes")
          missing = [f for f in required if not entry.get(f)]
          if missing:
              print(f"::error::manifest entry {key!r} is missing fields: {missing}")
              sys.exit(1)

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as fh:
              fh.write(f"version={entry['version']}\n")
              fh.write(f"url={entry['url']}\n")
              fh.write(f"sha256={entry['sha256']}\n")
              fh.write(f"size_bytes={entry['size_bytes']}\n")
              fh.write(f"min_app_version={entry.get('min_app_version', '')}\n")

          print(
              f"Resolved {key} -> version={entry['version']} "
              f"size={entry['size_bytes']} url={entry['url']}"
          )
          PY

      - name: Assert release tag matches manifest version
        run: |
          tag="${{ inputs.release_tag }}"
          manifest_version="${{ steps.manifest.outputs.version }}"
          case "${{ inputs.bundle_key }}" in
            vep_bundle)  expected="bundle-${manifest_version}" ;;
            lai_bundle)  expected="lai-bundle-${manifest_version}" ;;
            *) echo "::error::unknown bundle_key '${{ inputs.bundle_key }}'" ; exit 1 ;;
          esac
          if [ "$tag" != "$expected" ]; then
            echo "::error::release_tag '$tag' does not match manifest version '$manifest_version' (expected '$expected')"
            exit 1
          fi
          echo "Tag matches manifest version: $tag"

      - name: Download release asset (verified by tag)
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          tag="${{ inputs.release_tag }}"
          manifest_url="${{ steps.manifest.outputs.url }}"
          # Derive the asset name from the manifest URL basename so the
          # tag-verification works for any bundle (e.g. vep_bundle.db or
          # genomeinsight_lai_bundle_v1.1.tar.gz) without hardcoding versions.
          asset_name="${manifest_url##*/}"
          case "${{ inputs.bundle_key }}" in
            vep_bundle)  out="artifacts/vep_bundle.db" ;;
            lai_bundle)  out="artifacts/lai_bundle.tar.gz" ;;
            *) echo "::error::unknown bundle_key '${{ inputs.bundle_key }}'" ; exit 1 ;;
          esac
          if [ -z "$asset_name" ]; then
            echo "::error::could not derive asset name from manifest URL ($manifest_url)"
            exit 1
          fi
          # Resolve the asset's authoritative download URL from the release
          # specified by the input tag, instead of trusting the manifest URL
          # blindly. A mismatch means the manifest points outside this tag.
          release_url=$(gh release view "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq ".assets[] | select(.name == \"${asset_name}\") | .browser_download_url")
          if [ -z "$release_url" ]; then
            echo "::error::asset '${asset_name}' not found in release '$tag'"
            exit 1
          fi
          if [ "$release_url" != "$manifest_url" ]; then
            echo "::error::manifest URL ($manifest_url) does not match release '$tag' asset URL ($release_url)"
            exit 1
          fi
          gh release download "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${asset_name}" \
            --dir artifacts \
            --clobber
          # Normalize the on-disk path so downstream steps can reference it
          # uniformly regardless of bundle type.
          if [ "artifacts/${asset_name}" != "$out" ]; then
            mv "artifacts/${asset_name}" "$out"
          fi
          echo "path=$out" >> "$GITHUB_OUTPUT"
          ls -la artifacts/

      - name: Verify SHA-256
        run: |
          expected="${{ steps.manifest.outputs.sha256 }}"
          actual=$(sha256sum "${{ steps.download.outputs.path }}" | awk '{print $1}')
          if [ "$actual" != "$expected" ]; then
            echo "::error::SHA-256 mismatch: expected $expected, got $actual"
            exit 1
          fi
          echo "SHA-256 OK: $actual"

      - name: Verify size in bytes
        run: |
          expected="${{ steps.manifest.outputs.size_bytes }}"
          actual=$(stat -c %s "${{ steps.download.outputs.path }}")
          if [ "$actual" != "$expected" ]; then
            echo "::error::size_bytes mismatch: expected $expected, got $actual"
            exit 1
          fi
          echo "size_bytes OK: $actual"

      - name: Verify internal bundle_metadata.bundle_version
        if: inputs.bundle_key == 'vep_bundle'
        run: |
          python <<'PY'
          import sqlite3, sys

          manifest_version = "${{ steps.manifest.outputs.version }}"
          conn = sqlite3.connect("artifacts/vep_bundle.db")
          try:
              row = conn.execute(
                  "SELECT value FROM bundle_metadata WHERE key = 'bundle_version'"
              ).fetchone()
          except sqlite3.OperationalError as exc:
              print(f"::error::bundle SQLite missing bundle_metadata table: {exc}")
              sys.exit(1)
          finally:
              conn.close()

          if row is None:
              print(
                  "::error::bundle_metadata has no 'bundle_version' row — "
                  f"manifest expects {manifest_version}. Rebuild with "
                  "`scripts/build_vep_bundle.py --bundle-version <semver>`."
              )
              sys.exit(1)

          internal = row[0]
          if internal != manifest_version:
              print(
                  f"::error::bundle_metadata.bundle_version={internal!r} "
                  f"does not match manifest.version={manifest_version!r}"
              )
              sys.exit(1)

          print(f"Internal bundle_version OK: {internal}")
          PY

      - name: Verify internal metadata.json (LAI)
        if: inputs.bundle_key == 'lai_bundle'
        run: |
          mkdir -p artifacts/extracted
          tar -xzf "${{ steps.download.outputs.path }}" -C artifacts/extracted
          python <<'PY'
          import json, os, sys
          meta = json.load(open("artifacts/extracted/metadata.json"))
          expected = "${{ steps.manifest.outputs.version }}"
          if meta["bundle_version"] != expected:
              sys.exit(f"::error::metadata.json bundle_version {meta['bundle_version']!r} != manifest {expected!r}")
          print("metadata.json::bundle_version OK", meta["bundle_version"])
          PY

      - name: Summary
        run: |
          {
            echo "## Bundle release verification: ${{ inputs.release_tag }}"
            echo ""
            echo "- Manifest key: \`${{ inputs.bundle_key }}\`"
            echo "- Manifest version: \`${{ steps.manifest.outputs.version }}\`"
            echo "- min_app_version: \`${{ steps.manifest.outputs.min_app_version }}\`"
            echo "- Asset URL: ${{ steps.manifest.outputs.url }}"
            echo "- SHA-256: \`${{ steps.manifest.outputs.sha256 }}\`"
            echo "- size_bytes: \`${{ steps.manifest.outputs.size_bytes }}\`"
            echo ""
            echo "All checks passed. A maintainer can now flip the draft release to public:"
            echo ""
            echo "\`\`\`"
            echo "gh release edit ${{ inputs.release_tag }} --draft=false"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
