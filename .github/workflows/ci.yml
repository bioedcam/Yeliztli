name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python linter
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  # ── Backend tests (matrix: macOS ARM/x86 + Linux) ───────
  test-backend:
    name: Backend Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS ARM64
          - os: macos-15-intel
            name: macOS x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/backend/ -v --tb=short -m "not slow"

  # ── Frontend tests ──────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Vitest
        run: cd frontend && npm test

  # ── Frontend build ──────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Verify dist output
        run: test -f frontend/dist/index.html

  # ── Native install smoke test ───────────────────────────
  smoke-install:
    name: Install Smoke Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS ARM64
          - os: macos-15-intel
            name: macOS x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: Verify CLI entry point
        run: genomeinsight-setup --help

      - name: Verify data dir creation
        run: |
          python -c "
          from backend.installer import ensure_data_dir, DATA_DIR
          ensure_data_dir()
          assert DATA_DIR.is_dir()
          assert (DATA_DIR / 'samples').is_dir()
          assert (DATA_DIR / 'downloads').is_dir()
          assert (DATA_DIR / 'logs').is_dir()
          print('Data directory OK:', DATA_DIR)
          "

      - name: Verify health endpoint (quick start/stop)
        run: |
          # shellcheck disable=SC2329  # cleanup is invoked via the EXIT trap below
          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30 seconds"
          exit 1

  # ── Docker build test ────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Verify image exists
        run: docker images genomeinsight:latest --format "{{.Repository}}:{{.Tag}} {{.Size}}"

      - name: Start and health-check
        run: |
          docker compose up -d
          sleep 10
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health; then
              echo "Docker health check passed"
              docker compose down -v
              exit 0
            fi
            sleep 2
          done
          echo "Docker health check failed"
          docker compose logs
          docker compose down -v
          exit 1

  # ── E2E tests (merge to main only) ─────────────────────
  test-e2e:
    name: E2E Tests — ${{ matrix.browser }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install root E2E deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          GENOMEINSIGHT_HUEY_IMMEDIATE: "true"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Workflow lint (actionlint) ──────────────────────────
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@v1
        with:
          # fail_level: error == the deprecated `fail_on_error: true` (level defaults to error)
          fail_level: error
          # The repo's default workflow token is read-only (no pull-requests scope),
          # so the default github-pr-check reporter 403s ("Resource not accessible by
          # integration") fetching the PR diff. The local reporter makes no GitHub API
          # calls; nofilter lints every workflow (not just PR-diff lines). Combined with
          # fail_level: error the job still fails on any actionlint error-level finding.
          reporter: local
          filter_mode: nofilter
